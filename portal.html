<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal | Stella Polaris Publishing™</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <style>
    :root {
      --void: #08051A;
      --deep: #0F0B28;
      --purple: #1A1040;
      --violet: #2E1D60;
      --gold: #C9A84C;
      --gold-bright: #E2C47A;
      --gold-pale: #F5E9B8;
      --gold-dim: rgba(201,168,76,0.3);
      --rose: #D4547A;
      --teal: #3BBFB0;
      --parchment: #F5EDD8;
      --mist: rgba(245,237,216,0.6);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--void); color:var(--parchment); font-family:'Cormorant Garamond',serif; overflow-x:hidden; min-height:100vh; }

    /* STARFIELD */
    .sf { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .s  { position:absolute; border-radius:50%; animation:tw var(--d,3s) ease-in-out infinite alternate; opacity:0; }
    @keyframes tw { 0%{opacity:0} 100%{opacity:var(--o,.4)} }

    /* NAV */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 36px;
      background:linear-gradient(to bottom, rgba(8,5,26,0.97) 0%, rgba(8,5,26,0.75) 70%, transparent 100%);
      backdrop-filter:blur(8px);
    }
    .nav-left { display:flex; align-items:center; gap:14px; }
    .nav-logo  { height:44px; width:auto; filter:brightness(1.05) drop-shadow(0 2px 8px rgba(201,168,76,0.18)); }
    .nav-name  { font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:0.28em; color:var(--gold); text-transform:uppercase; opacity:0.65; line-height:1.4; }
    .nav-right { display:flex; align-items:center; gap:22px; }
    .nav-link  { font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.24em; color:var(--gold); text-decoration:none; text-transform:uppercase; opacity:0.5; transition:opacity 0.3s; }
    .nav-link:hover { opacity:1; }
    .nav-portal { font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em; color:var(--gold); text-decoration:none; text-transform:uppercase; border:1px solid rgba(201,168,76,0.45); padding:7px 14px; transition:all 0.3s; opacity:1; }

    /* PORTAL WRAPPER */
    .portal-wrap {
      position:relative; z-index:1;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:120px 24px 80px;
    }

    /* LOGIN CARD */
    .portal-card {
      background:rgba(15,11,40,0.88);
      border:1px solid rgba(201,168,76,0.18);
      border-radius:20px;
      padding:52px 52px 48px;
      width:100%; max-width:440px;
      backdrop-filter:blur(16px);
      box-shadow:0 0 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.08);
      text-align:center;
    }
    .portal-star { font-size:32px; color:var(--gold); opacity:0.5; margin-bottom:16px; line-height:1; }
    .portal-title { font-family:'Cinzel',serif; font-size:18px; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
    .portal-sub   { font-size:15px; color:var(--mist); opacity:0.7; margin-bottom:36px; font-style:italic; }

    .form-group { margin-bottom:18px; text-align:left; }
    .form-group label { display:block; font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:0.22em; color:var(--gold); opacity:0.6; text-transform:uppercase; margin-bottom:8px; }
    .form-group input {
      width:100%; background:rgba(8,5,26,0.7); border:1px solid rgba(201,168,76,0.2);
      border-radius:8px; padding:13px 16px; color:var(--parchment);
      font-family:'Cormorant Garamond',serif; font-size:16px;
      outline:none; transition:border-color 0.3s;
    }
    .form-group input:focus { border-color:rgba(201,168,76,0.55); }
    .form-group input::placeholder { color:rgba(245,237,216,0.3); }

    .btn-portal {
      width:100%; margin-top:8px; padding:15px;
      background:linear-gradient(135deg, rgba(201,168,76,0.22) 0%, rgba(201,168,76,0.12) 100%);
      border:1px solid rgba(201,168,76,0.38); border-radius:8px;
      font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.22em;
      color:var(--gold); text-transform:uppercase; cursor:pointer;
      transition:all 0.3s;
    }
    .btn-portal:hover { background:rgba(201,168,76,0.28); border-color:rgba(201,168,76,0.6); }
    .btn-portal:disabled { opacity:0.45; cursor:not-allowed; }

    .error-msg { margin-top:14px; font-size:13px; color:#E07070; min-height:18px; }
    .success-msg { margin-top:14px; font-size:13px; color:var(--teal); min-height:18px; }

    /* DASHBOARD */
    .dashboard-wrap {
      position:relative; z-index:1;
      min-height:100vh; padding:120px 36px 80px;
      max-width:900px; margin:0 auto;
    }
    .dash-header {
      display:flex; align-items:flex-end; justify-content:space-between;
      margin-bottom:48px; padding-bottom:20px;
      border-bottom:1px solid rgba(201,168,76,0.14);
    }
    .dash-greeting { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.22em; color:var(--gold); opacity:0.55; text-transform:uppercase; margin-bottom:6px; }
    .dash-name { font-size:32px; color:var(--parchment); font-weight:300; }
    .btn-signout {
      background:none; border:1px solid rgba(201,168,76,0.2); border-radius:6px;
      padding:8px 18px; font-family:'Cinzel',serif; font-size:7.5px;
      letter-spacing:0.2em; color:var(--gold); opacity:0.5;
      cursor:pointer; text-transform:uppercase; transition:all 0.3s;
    }
    .btn-signout:hover { opacity:1; border-color:rgba(201,168,76,0.4); }

    .dash-section-title {
      font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.26em;
      color:var(--gold); text-transform:uppercase; opacity:0.5;
      margin-bottom:24px;
    }
    .readings-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; }
    .reading-card {
      background:rgba(15,11,40,0.7); border:1px solid rgba(201,168,76,0.14);
      border-radius:14px; padding:28px 28px 24px; cursor:pointer;
      transition:all 0.3s; text-decoration:none; display:block;
    }
    .reading-card:hover { border-color:rgba(201,168,76,0.38); background:rgba(46,29,96,0.5); transform:translateY(-2px); }
    .reading-type { font-family:'Cinzel',serif; font-size:7px; letter-spacing:0.24em; color:var(--teal); text-transform:uppercase; opacity:0.7; margin-bottom:10px; }
    .reading-title { font-size:20px; color:var(--parchment); margin-bottom:10px; line-height:1.3; }
    .reading-date { font-size:12px; color:var(--mist); opacity:0.5; font-style:italic; }

    .no-readings { text-align:center; padding:80px 20px; opacity:0.45; }
    .no-readings p { font-size:18px; font-style:italic; }

    /* READING VIEW */
    .reading-view-wrap {
      position:relative; z-index:1;
      min-height:100vh; padding:120px 36px 80px;
      max-width:760px; margin:0 auto;
    }
    .btn-back {
      display:inline-flex; align-items:center; gap:8px;
      background:none; border:none; color:var(--gold); opacity:0.55;
      font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em;
      text-transform:uppercase; cursor:pointer; margin-bottom:40px;
      transition:opacity 0.3s; padding:0;
    }
    .btn-back:hover { opacity:1; }
    .reading-content { line-height:1.8; font-size:18px; }
    .reading-content h1,h2,h3 { font-family:'Cinzel',serif; color:var(--gold); margin:2em 0 0.6em; }
    .reading-content p { margin-bottom:1.2em; color:var(--mist); }
    .reading-content hr { border:none; border-top:1px solid rgba(201,168,76,0.15); margin:2.5em 0; }

    /* LOADING */
    .loading { display:flex; align-items:center; justify-content:center; min-height:60vh; }
    .loading-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); opacity:0.3; animation:ldot 1.2s ease-in-out infinite; margin:0 4px; }
    .loading-dot:nth-child(2) { animation-delay:0.2s; }
    .loading-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes ldot { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:0.8;transform:scale(1.1)} }

    /* FOOTER */
    footer { position:relative; z-index:1; padding:40px 36px; border-top:1px solid rgba(201,168,76,0.1); text-align:center; }
    .footer-copy { font-family:'Cinzel',serif; font-size:7px; letter-spacing:0.2em; color:var(--gold); opacity:0.25; text-transform:uppercase; }

    @media (max-width:600px) {
      .portal-card { padding:36px 24px 32px; }
      .dash-header { flex-direction:column; align-items:flex-start; gap:16px; }
      .reading-view-wrap, .dashboard-wrap { padding-left:20px; padding-right:20px; }
    }
  </style>
</head>

<!-- LOGIN VIEW -->
<div id="view-login" class="portal-wrap">
  <div class="portal-card">
    <div class="portal-star">⬡</div>
    <h1 class="portal-title">Client Portal</h1>
    <p class="portal-sub">Sign in to access your private readings</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-portal" id="login-btn">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
</div>

<!-- LOADING VIEW -->
<div id="view-loading" class="loading" style="display:none">
  <div class="loading-dot"></div>
  <div class="loading-dot"></div>
  <div class="loading-dot"></div>
</div>

<!-- DASHBOARD VIEW -->
<div id="view-dashboard" class="dashboard-wrap" style="display:none">
  <div class="dash-header">
    <div>
      <div class="dash-greeting">Welcome back</div>
      <div class="dash-name" id="dash-name">—</div>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
  <div class="dash-section-title">Your Readings</div>
  <div class="readings-grid" id="readings-grid"></div>
</div>

<!-- READING VIEW -->
<div id="view-reading" class="reading-view-wrap" style="display:none">
  <button class="btn-back" onclick="showDashboard()">← Back to Readings</button>
  <div class="reading-content" id="reading-content"></div>
</div>

<footer>
  <span class="footer-copy">© 2026 Stella Polaris Publishing™. All rights reserved.</span>
</footer>

<script>
// ─── Supabase config ────────────────────────────────────────────────
// Replace these two values with your project credentials from:
// Supabase Dashboard → Project Settings → API
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY';
// ────────────────────────────────────────────────────────────────────

let sb, currentUser;

window.addEventListener('DOMContentLoaded', async () => {
  // Starfield
  const sf = document.getElementById('sf');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 's';
    const sz = Math.random() * 2.2 + 0.4;
    const r  = Math.random();
    const col = r < 0.1 ? '#C9A84C' : r < 0.15 ? '#3BBFB0' : r < 0.18 ? '#D4547A' : 'white';
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*0.5+0.08).toFixed(2)};animation-delay:${(Math.random()*8).toFixed(1)}s;`;
    sf.appendChild(s);
  }

  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    show('login');
    return;
  }

  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    show('loading');

    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadDashboard();
    } else {
      show('login');
    }

    // Keep session alive automatically
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_OUT') {
        currentUser = null;
        show('login');
      }
    });
  } catch (e) {
    console.error(e);
    show('login');
  }
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('error-msg');

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    currentUser = data.user;
    await loadDashboard();
  } catch (error) {
    err.textContent = error.message || 'Sign-in failed. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

async function loadDashboard() {
  show('loading');

  // Display name: use user metadata if set, else email prefix
  const name = currentUser.user_metadata?.full_name
    || currentUser.user_metadata?.name
    || currentUser.email.split('@')[0];
  document.getElementById('dash-name').textContent = name;

  const grid = document.getElementById('readings-grid');
  grid.innerHTML = '';

  try {
    const { data: readings, error } = await sb
      .from('readings')
      .select('id, title, reading_type, created_at')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    if (error) throw error;

    if (!readings || readings.length === 0) {
      grid.innerHTML = '<div class="no-readings"><p>Your readings will appear here once published.</p></div>';
    } else {
      readings.forEach(r => {
        const card = document.createElement('a');
        card.className = 'reading-card';
        card.href = '#';
        card.innerHTML = `
          <div class="reading-type">${r.reading_type || 'Reading'}</div>
          <div class="reading-title">${escHtml(r.title)}</div>
          <div class="reading-date">${formatDate(r.created_at)}</div>`;
        card.addEventListener('click', async (e) => {
          e.preventDefault();
          await openReading(r.id, r.title);
        });
        grid.appendChild(card);
      });
    }
  } catch (err) {
    grid.innerHTML = '<div class="no-readings"><p>Could not load readings. Please refresh.</p></div>';
    console.error(err);
  }

  show('dashboard');
}

async function openReading(id, title) {
  show('loading');
  try {
    const { data, error } = await sb
      .from('readings')
      .select('content')
      .eq('id', id)
      .eq('user_id', currentUser.id)
      .single();
    if (error) throw error;
    document.getElementById('reading-content').innerHTML = data.content;
    show('reading');
  } catch (err) {
    console.error(err);
    showDashboard();
  }
}

function showDashboard() { show('dashboard'); window.scrollTo(0,0); }

async function signOut() {
  if (sb) await sb.auth.signOut();
  show('login');
  document.getElementById('login-form').reset();
  document.getElementById('error-msg').textContent = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In';
}

function show(view) {
  document.getElementById('view-login').style.display     = view === 'login'     ? 'flex'  : 'none';
  document.getElementById('view-loading').style.display   = view === 'loading'   ? 'flex'  : 'none';
  document.getElementById('view-dashboard').style.display = view === 'dashboard' ? 'block' : 'none';
  document.getElementById('view-reading').style.display   = view === 'reading'   ? 'block' : 'none';
  window.scrollTo(0, 0);
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
